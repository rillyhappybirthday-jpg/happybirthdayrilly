<!DOCTYPE html>
<html lang="en">
<head>
  <title>HAPPY BIRTHDAY</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #ddd5c4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    /* ── Card wrapper ── */
    .card-wrapper {
      width: 100%;
      max-width: 680px;
      padding: clamp(12px, 4vw, 28px);
    }

    /* ── Card ── */
    .card {
      position: relative;
      border-radius: 3px;
      padding: clamp(30px, 6vw, 56px) clamp(20px, 6vw, 52px);
      overflow: hidden;
      box-shadow: 5px 5px 24px rgba(0,0,0,0.22);

      background-color: #faf8f3;
      background-image:
        repeating-linear-gradient(
          transparent,
          transparent 27px,
          #b8cce4 27px,
          #b8cce4 28px
        );
    }

    /* torn top edge */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 12px;
      background: #faf8f3;
      clip-path: polygon(
        0% 100%,1% 0%,2% 80%,3% 20%,4% 70%,5% 10%,6% 60%,7% 0%,
        8% 50%,9% 90%,10% 30%,11% 70%,12% 10%,13% 60%,14% 100%,
        15% 40%,16% 80%,17% 20%,18% 70%,19% 0%,20% 50%,21% 90%,
        22% 30%,23% 70%,24% 10%,25% 60%,26% 100%,27% 40%,28% 80%,
        29% 20%,30% 70%,31% 0%,32% 50%,33% 90%,34% 30%,35% 70%,
        36% 10%,37% 60%,38% 100%,39% 40%,40% 80%,41% 20%,42% 70%,
        43% 0%,44% 50%,45% 90%,46% 30%,47% 70%,48% 10%,49% 60%,
        50% 100%,51% 40%,52% 80%,53% 20%,54% 70%,55% 0%,56% 50%,
        57% 90%,58% 30%,59% 70%,60% 10%,61% 60%,62% 100%,63% 40%,
        64% 80%,65% 20%,66% 70%,67% 0%,68% 50%,69% 90%,70% 30%,
        71% 70%,72% 10%,73% 60%,74% 100%,75% 40%,76% 80%,77% 20%,
        78% 70%,79% 0%,80% 50%,81% 90%,82% 30%,83% 70%,84% 10%,
        85% 60%,86% 100%,87% 40%,88% 80%,89% 20%,90% 70%,91% 0%,
        92% 50%,93% 90%,94% 30%,95% 70%,96% 10%,97% 60%,98% 100%,
        99% 40%,100% 80%,100% 100%
      );
    }

    /* torn right edge (dark strip) */
    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 14px;
      background: #2a2a2a;
      clip-path: polygon(
        0% 0%,100% 1%,80% 2%,20% 3%,70% 4%,10% 5%,60% 6%,0% 7%,
        50% 8%,90% 9%,30% 10%,70% 11%,10% 12%,60% 13%,100% 14%,
        40% 15%,80% 16%,20% 17%,70% 18%,0% 19%,50% 20%,90% 21%,
        30% 22%,70% 23%,10% 24%,60% 25%,100% 26%,40% 27%,80% 28%,
        20% 29%,70% 30%,0% 31%,50% 32%,90% 33%,30% 34%,70% 35%,
        10% 36%,60% 37%,100% 38%,40% 39%,80% 40%,20% 41%,70% 42%,
        0% 43%,50% 44%,90% 45%,30% 46%,70% 47%,10% 48%,60% 49%,
        100% 50%,40% 51%,80% 52%,20% 53%,70% 54%,0% 55%,50% 56%,
        90% 57%,30% 58%,70% 59%,10% 60%,60% 61%,100% 62%,40% 63%,
        80% 64%,20% 65%,70% 66%,0% 67%,50% 68%,90% 69%,30% 70%,
        70% 71%,10% 72%,60% 73%,100% 74%,40% 75%,80% 76%,20% 77%,
        70% 78%,0% 79%,50% 80%,90% 81%,30% 82%,70% 83%,10% 84%,
        60% 85%,100% 86%,40% 87%,80% 88%,20% 89%,70% 90%,0% 91%,
        50% 92%,90% 93%,30% 94%,70% 95%,10% 96%,60% 97%,100% 98%,
        40% 99%,80% 100%,0% 100%
      );
    }

    /* ── Hearts ── */
    .heart {
      position: absolute;
      opacity: 0.72;
    }
    .heart svg {
      width: 100%; height: 100%;
      fill: none;
      stroke: #b8946a;
      stroke-width: 5;
      filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.12));
    }
    .heart-tl {
      top: clamp(10px, 3vw, 22px);
      left: clamp(10px, 3vw, 22px);
      width: clamp(42px, 8.5vw, 70px);
      height: clamp(42px, 8.5vw, 70px);
    }
    .heart-br {
      bottom: clamp(10px, 3vw, 22px);
      right: clamp(18px, 4vw, 32px); /* offset for the dark torn edge */
      width: clamp(42px, 8.5vw, 70px);
      height: clamp(42px, 8.5vw, 70px);
    }

    /* ── "dear Rilly" ── */
    .dear-line {
      text-align: center;
      margin-bottom: clamp(6px, 1.5vw, 12px);
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .dear-plain {
      font-size: clamp(0.8rem, 2.6vw, 1.2rem);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em;
      color: #222;
    }
    .dear-super { font-size: 0.65em; vertical-align: super; }
    .dear-rilly {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.35rem, 5vw, 2.1rem);
      color: #111;
    }

    /* ── Ransom rows ── */
    .ransom-line {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      gap: clamp(2px, 0.7vw, 5px);
      margin: clamp(3px, 1vw, 7px) 0;
      position: relative;
      z-index: 1;
    }

    /* fluid letter size: min 1.25rem on tiny phone, max 2.25rem on desktop */
    .rl {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: clamp(1.25rem, 6.2vw, 2.25rem);
      line-height: 1;
      padding: clamp(1px, 0.5vw, 4px) clamp(2px, 1vw, 6px);
      border-radius: 2px;
      transform-origin: center bottom;
      animation: pop 0.4s ease both;
      flex-shrink: 0;
      /* prevent layout overflow */
      min-width: 0;
    }

    @keyframes pop {
      0%   { transform: scale(0.4) rotate(-10deg); opacity: 0; }
      80%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* letter palette */
    .lH  { background:#e74c3c; color:#fff; font-family:'Arial Black',sans-serif; transform:rotate(-3deg); }
    .lA1 { background:#f39c12; color:#2c3e50; font-family:Georgia,serif; font-style:italic; transform:rotate(2deg); }
    .lP1 { background:#e91e8c; color:#fff; font-family:'Courier New',monospace; transform:rotate(-2deg); }
    .lP2 { background:#cddc39; color:#333; font-family:Impact,sans-serif; transform:rotate(3deg); }
    .lY  { background:#1565c0; color:#fff; font-family:Georgia,serif; font-style:italic; transform:rotate(-1deg); }

    .lB  { background:#8e44ad; color:#f1c40f; font-family:Georgia,serif; font-style:italic; transform:rotate(-3deg); }
    .lI  { background:#e74c3c; color:#fff; font-family:'Courier New',monospace; border-radius:50%; }
    .lR  { background:#e67e22; color:#fff; font-family:'Dancing Script',cursive; font-size:1.1em; padding:0 3px; transform:rotate(2deg); }
    .lT  { background:#16a085; color:#fff; font-family:Impact,sans-serif; transform:rotate(-2deg); }
    .lH2 { background:#2c3e50; color:#ecf0f1; font-family:'Arial Black',sans-serif; transform:rotate(1deg); }
    .lD  { background:#d4b483; color:#111; font-family:Georgia,serif; transform:rotate(-1deg); }
    .lA2 { background:#bdc3c7; color:#2c3e50; font-family:'Courier New',monospace; font-size:0.82em; transform:rotate(3deg); }
    .lY2 { background:#8e44ad; color:#f39c12; font-family:'Dancing Script',cursive; font-size:1.15em; transform:rotate(-4deg); }

    /* stagger */
    .rl:nth-child(1)  { animation-delay:.05s }
    .rl:nth-child(2)  { animation-delay:.10s }
    .rl:nth-child(3)  { animation-delay:.15s }
    .rl:nth-child(4)  { animation-delay:.20s }
    .rl:nth-child(5)  { animation-delay:.25s }
    .rl:nth-child(6)  { animation-delay:.30s }
    .rl:nth-child(7)  { animation-delay:.35s }
    .rl:nth-child(8)  { animation-delay:.40s }
    .rl:nth-child(9)  { animation-delay:.45s }
    .rl:nth-child(10) { animation-delay:.50s }
    .rl:nth-child(11) { animation-delay:.55s }

    /* ── Button ── */
    .btn-area {
      text-align: center;
      margin-top: clamp(16px, 4vw, 28px);
      position: relative;
      z-index: 1;
    }
    .klik-btn {
      display: inline-block;
      background: #c579c8;
      color: #fff;
      font-size: clamp(0.9rem, 3.2vw, 1.25rem);
      font-weight: 900;
      letter-spacing: 0.13em;
      padding: clamp(10px, 2.5vw, 15px) clamp(22px, 8vw, 54px);
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Arial Black', sans-serif;
      box-shadow: 0 4px 0 #9b44a0;
      transition: transform .1s, box-shadow .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .klik-btn:hover,
    .klik-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #9b44a0;
      color: #fff;
      text-decoration: none;
    }

    /* ── Very small phones (≤ 360px) ── */
    @media (max-width: 360px) {
      .card { padding: 26px 12px 30px; }
      .heart-tl, .heart-br { width: 34px; height: 34px; }
      .card::after { display: none; } /* hide dark strip to save space */
    }
  </style>
</head>
<body>

<div class="card-wrapper">
  <div class="card">

    <div class="heart heart-tl">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 85 C50 85 5 55 5 28 C5 10 20 3 35 8 C42 10 47 15 50 20 C53 15 58 10 65 8 C80 3 95 10 95 28 C95 55 50 85 50 85Z"/>
      </svg>
    </div>

    <div class="heart heart-br">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 85 C50 85 5 55 5 28 C5 10 20 3 35 8 C42 10 47 15 50 20 C53 15 58 10 65 8 C80 3 95 10 95 28 C95 55 50 85 50 85Z"/>
      </svg>
    </div>

    <div class="dear-line">
      <span class="dear-plain">d<span class="dear-super">E</span>A<span style="font-size:0.78em">r</span></span>
      <span class="dear-rilly"> Rilly</span>
    </div>

    <div class="ransom-line">
      <span class="rl lH">H</span>
      <span class="rl lA1">A</span>
      <span class="rl lP1">p</span>
      <span class="rl lP2">p</span>
      <span class="rl lY">Y</span>
    </div>

    <div class="ransom-line">
      <span class="rl lB">B</span>
      <span class="rl lI">i</span>
      <span class="rl lR">r</span>
      <span class="rl lT">t</span>
      <span class="rl lH2">H</span>
      <span class="rl lD">d</span>
      <span class="rl lA2">A</span>
      <span class="rl lY2">y</span>
    </div>

    <div class="btn-area">
      <a href="happybirthday.html" class="klik-btn">KLIK DISINI</a>
    </div>

  </div>
</div>

</body>
</html>
